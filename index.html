<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#f6f7f9" />
    <meta name="description" content="NanStar Context 个人长期上下文工作台" />
    <title>NanStar Context</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="toastRegion" class="toast-region" aria-live="polite"></div>

    <section id="loginScreen" class="login-screen" hidden>
      <div class="login-panel">
        <div class="brand-mark" aria-hidden="true">N</div>
        <p class="eyebrow">NANSTAR / PRIVATE CONTEXT</p>
        <h1>进入你的长期上下文</h1>
        <p class="login-copy">资料、审核和上下文生成都在同一个私有工作台中完成。</p>
        <form id="loginForm" class="stack-form">
          <label class="field">
            <span>登录密钥</span>
            <input id="loginToken" type="password" autocomplete="current-password" required placeholder="输入 Cloudflare Secret 中的密钥" />
          </label>
          <button class="button button-primary button-wide" type="submit"><i data-lucide="log-in"></i>登录工作台</button>
        </form>
        <p id="loginError" class="form-error" hidden></p>
      </div>
    </section>

    <div id="appShell" class="app-shell" hidden>
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-top">
          <a class="brand" href="#dashboard" data-view="dashboard" aria-label="NanStar Context 首页">
            <span class="brand-mark small">N</span>
            <span class="brand-text"><strong>NanStar Context</strong><small>Personal knowledge source</small></span>
          </a>
          <button class="icon-button mobile-only" id="closeSidebar" type="button" aria-label="关闭导航" title="关闭导航"><i data-lucide="x"></i></button>
        </div>
        <nav class="main-nav" aria-label="主导航">
          <button class="nav-item active" type="button" data-view="dashboard"><i data-lucide="layout-dashboard"></i><span>工作台</span></button>
          <button class="nav-item" type="button" data-view="work"><i data-lucide="briefcase"></i><span>工作</span></button>
          <button class="nav-item" type="button" data-view="people"><i data-lucide="users"></i><span>人员</span></button>
          <button class="nav-item" type="button" data-view="audio"><i data-lucide="audio-lines"></i><span>音频</span></button>
          <button class="nav-item" type="button" data-view="captures"><i data-lucide="inbox"></i><span>收集箱</span><b id="navReviewCount" class="nav-count" hidden></b></button>
          <button class="nav-item" type="button" data-view="review"><i data-lucide="clipboard-check"></i><span>待审核</span><b id="navPendingCount" class="nav-count" hidden></b></button>
          <button class="nav-item" type="button" data-view="library"><i data-lucide="library"></i><span>知识库</span></button>
          <button class="nav-item" type="button" data-view="context"><i data-lucide="scan-text"></i><span>上下文生成</span></button>
          <button class="nav-item" type="button" data-view="settings"><i data-lucide="settings-2"></i><span>设置</span></button>
        </nav>
        <div class="sidebar-bottom">
          <div class="sync-status"><span class="status-dot ok"></span><span id="systemStatus">系统已连接</span></div>
          <button class="nav-item logout-item" id="logoutButton" type="button"><i data-lucide="log-out"></i><span>退出登录</span></button>
        </div>
      </aside>

      <main class="main-content">
        <header class="topbar">
          <button class="icon-button mobile-only" id="openSidebar" type="button" aria-label="打开导航" title="打开导航"><i data-lucide="menu"></i></button>
          <div class="breadcrumb"><span>NanStar Context</span><i data-lucide="chevron-right"></i><strong id="pageTitle">工作台</strong></div>
          <div class="topbar-actions"><button class="icon-button" id="refreshButton" type="button" aria-label="刷新数据" title="刷新数据"><i data-lucide="refresh-cw"></i></button><span class="private-pill"><i data-lucide="lock-keyhole"></i>仅自己可见</span></div>
        </header>
        <div id="viewRoot" class="view-root"></div>
      </main>
    </div>

    <dialog id="modal" class="modal">
      <div class="modal-card" id="modalCard"></div>
    </dialog>

    <script src="./assets/vendor/lucide.min.js"></script>
    <script src="./assets/vendor/marked.umd.js"></script>
    <script src="./assets/vendor/purify.min.js"></script>
    <script src="./assets/vendor/jszip.min.js"></script>
    <script type="module" src="./app.js"></script>
  </body>
</html>
